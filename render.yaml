services:
  - type: web
    name: call-intelligence-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: GROQ_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: STT_PROVIDER
        value: assemblyai
      - key: VECTOR_DB_PATH
        value: data/transcripts.db
